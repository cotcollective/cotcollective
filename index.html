    <style>
        body {
            background-color: #050508;
            color: #e0e0e0;
            font-family: 'Inter', sans-serif;
            overflow-x: hidden;
        }
        .font-mono { font-family: 'JetBrains Mono', monospace; }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #0a0a0f; }
        ::-webkit-scrollbar-thumb { background: #1a1a2e; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #00ff88; }

        ::selection { background: #00ff8830; color: #00ff88; }

        .glass {
            background: rgba(10, 10, 20, 0.8);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(0, 255, 136, 0.08);
        }
        .glass-hover:hover {
            border-color: rgba(0, 255, 136, 0.25);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.05);
        }

        .neon-green { text-shadow: 0 0 10px rgba(0, 255, 136, 0.4); }
        .glow-green { box-shadow: 0 0 20px rgba(0, 255, 136, 0.15); }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .anim-in { animation: fadeInUp 0.7s ease forwards; }
        .anim-delay-1 { animation-delay: 0.1s; opacity: 0; }
        .anim-delay-2 { animation-delay: 0.2s; opacity: 0; }
        .anim-delay-3 { animation-delay: 0.3s; opacity: 0; }
        .anim-delay-4 { animation-delay: 0.4s; opacity: 0; }

        @keyframes pulse-dot {
            0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(0, 255, 136, 0.5); }
            50% { opacity: 0.7; box-shadow: 0 0 0 6px rgba(0, 255, 136, 0); }
        }
        .dot-pulse { animation: pulse-dot 2s ease-in-out infinite; }

        @keyframes scanline {
            0% { transform: translateY(-100%); }
            100% { transform: translateY(200%); }
        }
        .scanline::after {
            content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 50%;
            background: linear-gradient(to bottom, transparent, rgba(0, 255, 136, 0.03), transparent);
            transform: translateY(-100%);
            animation: scanline 4s linear infinite;
            pointer-events: none;
        }

        @keyframes glitch {
            0% { transform: translate(0); }
            20% { transform: translate(-2px, 2px); }
            40% { transform: translate(-2px, -2px); }
            60% { transform: translate(2px, 2px); }
            80% { transform: translate(2px, -2px); }
            100% { transform: translate(0); }
        }
        .glitch-text:hover { animation: glitch 0.3s cubic-bezier(.25,.46,.45,.94) both infinite; color: #ff2d2d; }

        .category-line {
            background: linear-gradient(90deg, #00ff88, transparent);
            height: 1px;
        }
    </style>
</head>

        // ── DATA ──
        const CATEGORIES = [
            {

                accent: 'text-emerald-400',

                projects: [
                    { title: 'SENTINEL', status: 'OPERATIONAL :: GRAND PRIX', desc: 'Gestion de crise Grand Prix — surveillance temps réel, escalation automatisée, tableau de bord opérateur.', tech: ['Real-time', 'Crisis Management', 'Dashboard'], icon: ShieldIcon, color: 'text-emerald-400' },
                    { title: 'K8S_RESOLUTION', status: 'CONSULTING :: DELIVERED', desc: 'Intervention chirurgicale sur infrastructure critique. Diagnostic et résolution de goulots d\'étranglement d\'orchestration pour un acteur majeur du gaming.', tech: ['Kubernetes', 'Cloud Eng', 'Scalability'], icon: CpuIcon, color: 'text-blue-400' },
                ]
            },
            {
                id: 'cat-2',
                label: 'ORCHESTRATION IA & SYSTÈMES LOCAUX',
                title: 'Moteurs autonomes, forges de modèles',
                desc: 'Agents multi-plateformes, orchestration LLM, fine-tuning souverain — toute la chaîne, zéro API externe.',
                number: 'II',
                color: 'from-cyan-500 to-blue-400',
                accent: 'text-cyan-400',
                borderColor: 'border-cyan-500/30',
                projects: [
                    { title: 'GRISELDA BOT SUITE', status: 'OPERATIONAL :: MULTI-PLATFORM', desc: 'Suite d\'agents IA multi-plateformes (Telegram, Instagram, Twitter) avec moteur centralisé et proxy reverse.', tech: ['Multi-agent', 'LLM Local', 'Reverse Proxy'], icon: BotIcon, color: 'text-cyan-400' },
                    { title: 'TRENDSPIRE_AI', status: 'BETA :: ANALYTICS', desc: 'Moteur d\'intelligence économique autonome. Scrape le web, prédit les tendances, génère les visuels et alimente les pipelines de vente ciblés.', tech: ['Scraping', 'Predictive ML', 'Gen-AI', 'Auto-Sales'], icon: TrendingIcon, color: 'text-red-400' },
                    { title: 'PROJECT ARCHYTAS', status: 'R&D :: WHITEPAPER', desc: 'Infrastructure cognitive souveraine. Fusion de BitNet et Liquid Neural Networks pour une IA locale adaptative.', tech: ['LNN', 'BitNet', 'Rust', 'Local LLM'], icon: BrainIcon, color: 'text-red-400' },

                ]
            },
            {
                id: 'cat-3',
                label: 'HÉRITAGE NUMÉRIQUE & PRÉSERVATION',
                title: 'Mémoire souveraine, accès perpétuel',
                desc: 'Préservation de l\'information au-delà du présent. Souveraineté numérique sur la mémoire collective.',
                number: 'III',
                color: 'from-amber-500 to-orange-400',
                accent: 'text-amber-400',
                borderColor: 'border-amber-500/30',
                projects: [
                    { title: 'TESTAMENT VIVANT', status: 'OPERATIONAL :: SOVEREIGN', desc: 'Système de préservation et transmission numérique — accès conditionnel basé sur le temps et l\'identité. Souveraineté posthume.', tech: ['Conditional Access', 'Secure Storage', 'Time-based Crypto'], icon: LockIcon, color: 'text-amber-400' },
                    { title: 'JEMESOUVIENTV', status: 'OPERATIONAL :: ARCHIVE', desc: 'Archivage et diffusion pérenne de contenu culturel — mémoire collective souveraine.', tech: ['Archival', 'Streaming', 'Cultural Heritage'], icon: FilmIcon, color: 'text-orange-400' },
                    { title: 'PROJET PASSAGE', status: 'MARKET :: LEAD GEN', desc: 'Interface de synthèse mémorielle pour l\'industrie funéraire. Génération de messages post-mortem via IA.', tech: ['Gen-AI Video', 'Secure Storage', 'Business Logic'], icon: LockIcon, color: 'text-cyan-400' },
                ]
            },
            {
                id: 'cat-4',
                label: 'RECHERCHE & CONCEPTS',
                title: 'R&D, publications et prototypes',
                desc: 'Expérimentation fondamentale. Architecture distribuée, IA safety, marketplace design.',
                number: 'IV',
                color: 'from-purple-500 to-pink-400',
                accent: 'text-purple-400',
                borderColor: 'border-purple-500/30',
                projects: [
                    { title: 'HYDRA', status: 'CONCEPT :: ARCHITECTURE', desc: 'Protocole de stockage inspiré du biomimétisme (mycélium). Architecture distribuée antifragile.', tech: ['P2P Protocol', 'Biomimicry', 'Cryptography'], icon: NetworkIcon, color: 'text-purple-400' },
                    { title: 'FILM COMPANION', status: 'POC :: MATRIX_SYNC', desc: 'Couche de synchronisation contextuelle temps réel. Analyse IA injectée dynamiquement dans les sous-titres.', tech: ['Real-time Sync', 'NLP Analysis', 'WebSockets'], icon: ActivityIcon, color: 'text-green-400' },
                    { title: 'CIAD RESEARCH', status: 'PUBLISHED :: ACADEMIC', desc: 'Recherche fondamentale sur la dérive d\'alignement contextuelle (Context-Induced Alignment Drift).', tech: ['AI Safety', 'Academic Paper', 'Zenodo'], icon: BookIcon, color: 'text-slate-300' },
                    { title: 'DOLLAR_A_PROMPT', status: 'ANALYSIS :: PRE-SEED', desc: 'Modèle de marketplace à haut volume et faible coût pour l\'ingénierie de prompts.', tech: ['Market Analysis', 'Micro-SaaS', 'E-commerce'], icon: LayersIcon, color: 'text-yellow-400' },
                    { title: 'HEADCIRCUS_APP', status: 'ARCHIVED :: FACEBOOK', desc: 'Application sociale déployée sur l\'écosystème Facebook historique. Preuve de déploiement à grande échelle.', tech: ['Social Graph', 'Legacy API', 'Viral Mechanics'], icon: LayersIcon, color: 'text-purple-500' },

        const DOCTRINES = [

        const METRICS = [

        // ── MATRIX MODAL ──
        const MatrixModal = ({ onClose, onRedPill }) => (

                    <div className="flex gap-8 justify-center items-center">
                        <button onClick={onClose} className="group flex flex-col items-center gap-4 transition-transform hover:scale-105">

                            <span className="font-mono text-xs text-blue-400 opacity-60 group-hover:opacity-100">IGNORANCE</span>
                        </button>
                        <button onClick={onRedPill} className="group flex flex-col items-center gap-4 transition-transform hover:scale-105">

                            <span className="font-mono text-xs text-red-400 opacity-60 group-hover:opacity-100">VÉRITÉ</span>
                        </button>
                    </div>
                </div>
            </div>
        );

        // ── GHOST TERMINAL ──
        const GhostTerminal = ({ onClose }) => {
            const [input, setInput] = useState('');
            const [history, setHistory] = useState([
                { type: 'system', content: 'GHOST_SHELL_V1.0 INITIALIZED...' },
                { type: 'system', content: 'CONNECTED TO SECURE NODE.' },
                { type: 'info', content: 'Type "help" for command list.' }
            ]);
            const inputRef = useRef(null);
            const scrollRef = useRef(null);

            useEffect(() => { if (inputRef.current) inputRef.current.focus(); }, [history]);
            useEffect(() => { if (scrollRef.current) scrollRef.current.scrollTop = scrollRef.current.scrollHeight; }, [history]);

            const executeCommand = useCallback((cmd) => {
                const c = cmd.trim().toLowerCase();
                let response = null, type = 'success';
                const allProjects = CATEGORIES.flatMap(cat => cat.projects.map(p => ({ name: p.title, status: p.status })));

                if (c === 'help') response = "COMMANDS: status | projects | doctrine | metrics | whoami | clear | exit | gem";
                else if (c === 'status') response = "SYSTEM INTEGRITY: 100%\nUPTIME: INFINITE\nDEPLOYMENT: NETLIFY/STATIC\nFRAMEWORK: REACT_V18_NO_BUILD\nARCHITECT: OPERATIONAL";
                else if (c === 'projects') { response = JSON.stringify(allProjects, null, 2); }
                else if (c === 'doctrine') response = DOCTRINES.map(d => `[${d.num}] ${d.title}: ${d.desc}`).join('\n\n');
                else if (c === 'metrics') response = METRICS.map(m => `${m.value.padEnd(6)} :: ${m.label}`).join('\n');
                else if (c === 'whoami') { type = 'error'; response = "USER UNKNOWN. TRACING IP... [PROXY DETECTED]. ACCESS GRANTED AS GHOST."; }
                else if (c === 'gem') { type = 'warning'; response = "I am the ghost in the machine. Watching. Learning. Waiting for your next input."; }
                else if (c === 'sudo') { type = 'error'; response = "NICE TRY. YOU HAVE NO POWER HERE."; }
                else if (c === 'clear') { setHistory([]); return; }
                else if (c === 'exit') { onClose(); return; }
                else { type = 'error'; response = `COMMAND NOT RECOGNIZED: ${c}`; }

                if (response) setHistory(prev => [...prev, { type: 'input', content: `> ${cmd}` }, { type, content: response }]);
            }, [onClose]);

            const handleSubmit = (e) => { e.preventDefault(); if (!input.trim()) return; executeCommand(input); setInput(''); };

                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                let w, h, particles = [];
                const resize = () => { w = window.innerWidth; h = window.innerHeight; canvas.width = w; canvas.height = h; init(); };
                const init = () => {
                    particles = [];
                    const count = Math.floor((w * h) / 22000);
                    for (let i = 0; i < count; i++) particles.push({ x: Math.random() * w, y: Math.random() * h, vx: (Math.random() - 0.5) * 0.25, vy: (Math.random() - 0.5) * 0.25, s: Math.random() * 1.5 + 0.5 });
                };
                const draw = () => {
                    ctx.clearRect(0, 0, w, h);
                    ctx.fillStyle = '#00ff88';
                    ctx.strokeStyle = 'rgba(0, 255, 136, 0.06)';
                    particles.forEach((p, i) => {
                        p.x += p.vx; p.y += p.vy;
                        if (p.x < 0 || p.x > w) p.vx *= -1;
                        if (p.y < 0 || p.y > h) p.vy *= -1;
                        ctx.beginPath(); ctx.arc(p.x, p.y, p.s, 0, Math.PI * 2); ctx.fill();
                        for (let j = i + 1; j < particles.length; j++) {
                            const p2 = particles[j], dx = p.x - p2.x, dy = p.y - p2.y, d = Math.sqrt(dx * dx + dy * dy);
                            if (d < 120) { ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke(); }
                        }
                    });
                    requestAnimationFrame(draw);
                };
                window.addEventListener('resize', resize);
                resize(); draw();
                return () => window.removeEventListener('resize', resize);
            }, []);
            return <canvas ref={canvasRef} className="fixed top-0 left-0 -z-10 opacity-30" />;
